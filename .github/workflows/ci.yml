name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    container: python:latest
    steps:
      - uses: actions/checkout@v3
      - name: Install dependencies
        run: pip install flask
      - name: Run unit tests
        run: python -m unittest -v tests/appTest.py
